services:
  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama        # persist downloaded models
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]    # give the container your GTX 1650

  agent:
    build: .
    container_name: agent
    environment:
      - OLLAMA_URL=http://ollama:11434/api/chat   # reach Ollama by service name
      - MODEL=qwen2.5:3b
    depends_on:
      - ollama
    stdin_open: true                 # keep STDIN open...
    tty: true                        # ...so the chat prompt works

volumes:
  ollama:
